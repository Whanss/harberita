<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background merah -->
  <rect width="64" height="64" rx="10" fill="#dc2626"/>
  <!-- Accent strip bawah -->
  <rect x="0" y="48" width="64" height="16" rx="0" fill="#b91c1c"/>
  <rect x="0" y="54" width="64" height="10" rx="0" fill="#991b1b"/>
  <!-- Rounded bottom corners -->
  <rect x="0" y="54" width="10" height="10" fill="#991b1b"/>
  <rect x="54" y="54" width="10" height="10" fill="#991b1b"/>
  <rect width="64" height="64" rx="10" fill="none"/>

  <!-- Huruf H -->
  <text x="4" y="44" font-family="Georgia, serif" font-size="28" font-weight="900" fill="white" letter-spacing="-1">H</text>
  <!-- Huruf S merah muda/terang -->
  <text x="22" y="44" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#fca5a5" letter-spacing="-1">S</text>
  <!-- Huruf B -->
  <text x="39" y="44" font-family="Georgia, serif" font-size="28" font-weight="900" fill="white" letter-spacing="-1">B</text>

  <!-- Garis bawah teks -->
  <rect x="4" y="47" width="56" height="2.5" rx="1" fill="white" opacity="0.3"/>

  <!-- Titik merah kecil di pojok kanan atas (aksen) -->
  <circle cx="56" cy="10" r="4" fill="#fca5a5"/>
</svg>
